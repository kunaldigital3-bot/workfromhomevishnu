    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .main-heading {
            color: #bd322c;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .main-heading i {
            color: #d4a373;
            margin-left: 5px;
        }

        /* DP/Logo Style */
        .profile-dp {
            width: 130px;
            height: 130px;
            border: 4px solid #52b788;
            border-radius: 50%;
            margin: 0 auto 30px auto;
            display: block;
            object-fit: cover; /* इमेज को बिना स्ट्रेच किए सही से फिट रखेगा */
            background-color: #f8f9fa;
        }

        .features-list {
            text-align: left;
            margin-bottom: 30px;
            padding-left: 5px;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
            font-size: 16px;
            color: #333;
            line-height: 1.4;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .check-icon {
            color: #52b788;
            font-size: 20px;
            margin-right: 12px;
            margin-top: 2px;
        }

        .tag {
            font-weight: 700;
            color: #2b2d42;
            margin-right: 5px;
        }

        .emoji {
            margin: 0 4px;
        }

        .btn-apply {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #3a86ff, #00b4d8);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(58, 134, 255, 0.3);
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .btn-apply:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 134, 255, 0.4);
            background: linear-gradient(135deg, #00b4d8, #3a86ff);
        }

        .btn-apply i {
            margin-right: 10px;
            font-size: 20px;
        }

        .urgency-text {
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        .urgency-text i {
            color: #e63946;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="main-heading">Work From Home <i class="fa-solid fa-house-chimney"></i></h1>
        
        <img src="logo.png" alt="Profile Logo" class="profile-dp">

        <div class="features-list">
            <div class="feature-item">
                <i class="fa-solid fa-square-check check-icon"></i>
                <div><span class="tag">STUDENTS</span><span class="emoji">📚</span> पढ़ाई के साथ EXTRA INCOME</div>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-square-check check-icon"></i>
                <div><span class="tag">HOUSEWIFE</span><span class="emoji">🏠</span> खाली समय का सही इस्तेमाल</div>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-square-check check-icon"></i>
                <div><span class="tag">JOB SEEKERS</span><span class="emoji">💼</span> के नए SOURCE</div>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-square-check check-icon"></i>
                <div><span class="tag">Handwriting Work Guidance</span></div>
            </div>
        </div>

        <a href="https://t.me/+ZByHaU4SsDJlZTY1" target="_blank" class="btn-apply">
            <i class="fa-brands fa-telegram"></i> APPLY NOW (TELEGRAM)
        </a>

        <div class="urgency-text">
            <i class="fa-solid fa-fire"></i> Hurry! Limited Slots Available
        </div>
    </div>

</body>
